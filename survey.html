<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Survey</title>

  <style>
    /* WHITE CUBE GALLERY VIBE */
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
      font-family: Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 0 24px;
    }

    .title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .frame {
      border: 1px solid #e5e5e5;
      padding: 0;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
    }

    /* subtle hover like gallery labels */
    .title:hover {
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">Survey</div>

    <div class="frame">
      <iframe 
        src="https://tally.so/r/RGYoXj?transparentBackground=1"
        loading="lazy"
      ></iframe>
    </div>
  </div>
</body>
</html>

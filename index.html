<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date</title>
  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Inter', Helvetica, Arial, sans-serif;
    }

    .container {
      line-height: 1; /* very tight leading */
    }

    /* Fade-in animation */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Stagger each line */
    .fade:nth-child(1) { animation-delay: 0s; }
    .fade:nth-child(2) { animation-delay: 0.4s; }
    .fade:nth-child(3) { animation-delay: 0.8s; }
    .fade:nth-child(4) { animation-delay: 1.2s; }
    .fade:nth-child(5) { animation-delay: 1.6s; }
    .fade:nth-child(6) { animation-delay: 2s; }
    .fade:nth-child(7) { animation-delay: 2.4s; }
    .fade:nth-child(8) { animation-delay: 2.8s; } /* new last line */

    .container span {
      display: block;
      margin: 0.3rem 0; /* tighter vertical spacing */
    }

    .main-text {
      font-size: 40pt;
      font-weight: 400;
      text-transform: uppercase; /* all caps */
    }

    .popup-bar {
      font-size: 25pt;
      font-weight: 400;
      text-transform: uppercase;
    }

    .rsvp-link {
      text-decoration: underline;
      color: black;
      font-size: 40pt;
      display: inline-block;
    }

    .rsvp-link:hover {
      opacity: 0.7;
    }

    .details {
      font-size: 13pt;
      font-style: italic;
      margin-top: 0.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="main-text fade">SAVE THE DATE</span>
    <span class="main-text fade">ANDRE MAGANA & CARLY MANDEL</span>
    <span class="main-text fade">MARRIAGE CELEBRATION</span>
    <span class="popup-bar fade">(POPUP BAR)</span>
    <span class="main-text fade">AUGUST 22, 2026</span>
    <span class="main-text fade">BROOKLYN, NEW YORK</span>
    <a class="rsvp-link fade" href="survey.html">RSVP HERE BY JULY 1, 2026</a>
    <span class="details fade">DETAILS TO FOLLOW</span>
  </div>
</body>
</html>

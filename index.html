<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
  }

  .container {
    display: inline-block;
    text-align: center;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    line-height: 1.25; /* breathing room between lines */
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .line {
    display: block;
    font-weight: 700;
    text-transform: uppercase;
    margin: 0.2rem 0;
  }

  /* Font sizes adjusted to form a rectangle */
  .line1 { font-size: 38pt; }  /* SAVE THE DATE */
  .line2 { font-size: 32pt; }  /* Names */
  .line3 { font-size: 32pt; }  /* Marriage Celebration */
  .line4 { font-size: 28pt; margin-bottom: 1rem; }  /* Popup Bar */
  .line5 { font-size: 32pt; }  /* Date */
  .line6 { font-size: 28pt; }  /* Location */
  .rsvp-link { 
    font-size: 32pt; 
    display: block; 
    color: black; 
    text-decoration: underline; 
    margin-top: 0.3rem; 
  }
  .details { 
    font-size: 20pt; 
    font-style: italic; 
    display: block; 
    margin-top: 0.5rem; 
  }
</style>
</head>
<body>
  <div class="container">
    <span class="line line1">SAVE THE DATE</span>
    <span class="line line2">ANDRE MAGANA & CARLY MANDEL</span>
    <span class="line line3">MARRIAGE CELEBRATION</span>
    <span class="line line4">(POPUP BAR)</span>
    <span class="line line5">AUGUST 22, 2026</span>
    <span class="line line6">BROOKLYN, NEW YORK</span>
    <a class="rsvp-link" href="survey.html">RSVP HERE BY JULY 1, 2026</a>
    <span class="details">DETAILS TO FOLLOW</span>
  </div>
</body>
</html>

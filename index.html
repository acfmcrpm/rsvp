<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date</title>
  <!-- Mona Sans font -->
  <link href="https://fonts.googleapis.com/css2?family=Mona+Sans&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Mona Sans', Georgia, serif;
    }

    .container {
      line-height: 1.1; /* tighter leading */
    }

    /* Fade-in animation */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s forwards;
    }

    /* Keyframes for fade-in + upward movement */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Stagger each line */
    .fade:nth-child(1) { animation-delay: 0s; }
    .fade:nth-child(2) { animation-delay: 0.4s; }
    .fade:nth-child(3) { animation-delay: 0.8s; }
    .fade:nth-child(4) { animation-delay: 1.2s; }
    .fade:nth-child(5) { animation-delay: 1.6s; }
    .fade:nth-child(6) { animation-delay: 2s; }
    .fade:nth-child(7) { animation-delay: 2.4s; }

    .container span {
      display: block;
      margin: 0.5rem 0;
    }

    .main-text {
      font-size: 40pt;
      font-weight: normal;
      text-transform: none;
    }

    .popup-bar {
      font-size: 25pt;
      font-weight: normal;
      text-transform: none;
    }

    .rsvp-link {
      text-decoration: underline;
      color: black;
      font-size: 40pt;
      display: inline-block; /* needed for animation */
    }

    .rsvp-link:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="main-text fade">Save the date</span>
    <span class="main-text fade">Andre Magana & Carly Mandel</span>
    <span class="main-text fade">Marriage celebration</span>
    <span class="popup-bar fade">(Popup bar)</span>
    <span class="main-text fade">August 22, 2026</span>
    <span class="main-text fade">Brooklyn, New York</span>
    <a class="rsvp-link fade" href="survey.html">RSVP here by July 1, 2026</a>
  </div>
</body>
</html>

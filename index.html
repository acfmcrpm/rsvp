<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date</title>
  <!-- Mona Sans font -->
  <link href="https://fonts.googleapis.com/css2?family=Mona+Sans&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Mona Sans', Georgia, serif;
    }

    .container {
      line-height: 1.2; /* tighter leading */
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container span {
      display: block;
      margin: 0.5rem 0;
    }

    .main-text {
      font-size: 40pt;
      font-weight: normal;
      text-transform: none; /* normal capitalization */
    }

    .popup-bar {
      font-size: 25pt;
      font-weight: normal;
      text-transform: none;
    }

    .rsvp-link {
      text-decoration: underline;
      color: black;
      font-size: 40pt;
    }

    .rsvp-link:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="main-text">Save the date</span>
    <span class="main-text">Andre Magana & Carly Mandel</span>
    <span class="main-text">Marriage celebration</span>
    <span class="popup-bar">(Popup bar)</span>
    <span class="main-text">August 22, 2026</span>
    <span class="main-text">Brooklyn, New York</span>
    <a class="rsvp-link" href="survey.html">RSVP here by July 1, 2026</a>
    <span class="formal">Details to follow</span>
  </div>
</body>
</html>

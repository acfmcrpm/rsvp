<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', Helvetica, Arial, sans-serif;
    text-align: center;
  }

  .container {
    display: inline-block;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    line-height: 1.2;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .line {
    display: block;
    font-weight: 700;
    text-transform: uppercase;
    margin: 0.2rem 0;
  }

  /* Rectangular block alignment: set a fixed width and adjust font size */
  .line1 { font-size: 36pt; width: 38ch; }  /* SAVE THE DATE */
  .line2 { font-size: 28pt; width: 38ch; }  /* Names */
  .line3 { font-size: 28pt; width: 38ch; }  /* Marriage Celebration */
  .line4 { font-size: 24pt; width: 38ch; }  /* Popup Bar */
  .line5 { font-size: 28pt; width: 38ch; }  /* Date */
  .line6 { font-size: 24pt; width: 38ch; }  /* Location */
  .rsvp-link { font-size: 28pt; width: 38ch; display: inline-block; text-decoration: underline; color: black; }
  .details { font-size: 20pt; font-style: italic; width: 38ch; display: inline-block; margin-top: 0.5rem; }

</style>
</head>
<body>
  <div class="container">
    <span class="line line1">SAVE THE DATE</span>
    <span class="line line2">ANDRE MAGANA & CARLY MANDEL</span>
    <span class="line line3">MARRIAGE CELEBRATION</span>
    <span class="line line4">(POPUP BAR)</span>
    <span class="line line5">AUGUST 22, 2026</span>
    <span class="line line6">BROOKLYN, NEW YORK</span>
    <a class="rsvp-link" href="survey.html">RSVP HERE BY JULY 1, 2026</a>
    <span class="details">DETAILS TO FOLLOW</span>
  </div>
</body>
</html>
